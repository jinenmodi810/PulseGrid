# Local Redpanda (Kafka API) for PulseGrid domain outbox publishing.
# Start: docker compose up -d
# Broker for host apps: localhost:19092
# Set in backend/.env: KAFKA_BOOTSTRAP_SERVERS=localhost:19092

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.11
    container_name: pulsegrid-redpanda
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 512M
      - --overprovisioned
      - --node-id
      - "0"
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
    ports:
      - "19092:19092"
      - "9644:9644"
      - "18081:8081"
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  minio:
    image: minio/minio:latest
    container_name: pulsegrid-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: pulsegrid-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb -p local/pulsegrid-bronze || true;
      mc mb -p local/pulsegrid-bronze/events/incident || true;
      mc mb -p local/pulsegrid-bronze/events/organization || true;
      mc mb -p local/pulsegrid-bronze/events/volunteer || true;
      exit 0;
      "

volumes:
  redpanda_data:
  minio_data:
