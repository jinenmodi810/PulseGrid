name: pulsegrid
description: Community crisis coordination and recovery — Phase 0 backbone.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  flutter_dotenv: ^6.0.0
  flutter_riverpod: ^3.0.3
  go_router: ^17.0.0
  google_fonts: ^6.3.3
  shared_preferences: ^2.5.4
  web_socket_channel: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/json/mock_incidents.json
    - assets/json/mock_volunteers.json
    - assets/json/mock_responders.json
    - assets/json/mock_hospitals.json
    - assets/json/mock_shelters.json
    - assets/json/mock_support_contacts.json
    - assets/json/mock_routes.json
    - assets/json/mock_rewards.json
    - assets/icons/
    - assets/images/
    - assets/fonts/
